name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type: ship it"
        required: true
      version:
        description: "Release version"
        required: true
        default: "1.0.0"

jobs:
  publish:
    if: ${{ inputs.confirm == 'ship it' && inputs.version == '1.0.0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: make release-check
      - run: uv build
      - run: uv publish
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            sgaabdu4/cite-or-die:1.0.0
            sgaabdu4/cite-or-die:latest
