name: Security

on:
  workflow_dispatch:

jobs:
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: make adversarial
      - run: make mutation
