name: Nightly

on:
  schedule:
    - cron: "31 4 * * *"
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: make e2e-local
      - run: make eval-t2ragbench-100
      - run: make eval-graph
      - run: make adversarial
      - run: make mutation
      - run: make release-security
      - run: uv run python scripts/provider_smoke.py fake
