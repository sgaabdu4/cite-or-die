receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  attributes/scrub:
    actions:
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: query.text
        action: delete
      - key: doc.content
        action: delete
      - key: prompt
        action: delete
      - key: response.body
        action: delete
  redaction/pii_allowlist:
    allow_all_keys: false
    allowed_keys:
      - service.name
      - http.method
      - http.request.method
      - http.route
      - http.status_code
      - http.response.status_code
      - http.target
      - url.path
      - url.scheme
      - net.peer.name
      - net.peer.port
      - server.address
      - server.port
      - tenant_id
      - matter_id
      - request_id
      - latency_ms
      - token_count
      - model
      - recall_at_k
      - faithfulness
      - hallucination_rate
      - error_code

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/scrub, redaction/pii_allowlist, batch]
      exporters: [otlp/tempo, debug]
