receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  attributes/pii_allowlist:
    actions:
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: query.text
        action: delete
      - key: doc.content
        action: delete
      - key: prompt
        action: delete

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/pii_allowlist, batch]
      exporters: [otlp/tempo, debug]
