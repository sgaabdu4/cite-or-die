<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cite-or-die</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">c/d</span>
          <h1>cite-or-die</h1>
        </div>

        <form id="scope-form" class="scope-form" aria-label="Matter scope">
          <label>
            <span>Tenant</span>
            <input id="tenant" autocomplete="off" value="dev" />
          </label>
          <label>
            <span>Matter</span>
            <input id="matter" autocomplete="off" value="m_default" />
          </label>
          <details class="token-details">
            <summary>Token</summary>
            <label>
              <span>Access token</span>
              <input id="access-token" autocomplete="off" placeholder="Required in prod" />
            </label>
          </details>
        </form>
      </header>

      <section class="workspace" aria-label="Document question workspace">
        <aside class="sources-pane" aria-label="Sources">
          <div class="pane-head">
            <h2>Sources</h2>
            <button id="refresh-docs" class="ghost-button" type="button">Refresh</button>
          </div>

          <form id="upload-form" class="upload-form">
            <label class="file-picker">
              <span id="file-name">Choose file</span>
              <input id="file" name="file" type="file" />
            </label>
            <button type="submit">Upload</button>
          </form>

          <p id="upload-result" class="status-line" role="status"></p>
          <ol id="document-list" class="document-list" aria-live="polite"></ol>
        </aside>

        <section class="chat-pane" aria-label="Chat">
          <div id="transcript" class="transcript" aria-live="polite"></div>
          <form id="chat-form" class="composer">
            <textarea
              id="question"
              rows="2"
              placeholder="Ask from this matter"
              required
            ></textarea>
            <button id="ask-button" type="submit">Ask</button>
          </form>
        </section>
      </section>

      <aside id="citation-drawer" class="citation-drawer" aria-hidden="true" aria-label="Citation">
        <div class="viewer-toolbar">
          <div>
            <h2 id="viewer-title">Citation</h2>
            <p id="viewer-meta">No source selected</p>
          </div>
          <button id="close-citation" class="ghost-button" type="button">Close</button>
        </div>
        <div id="viewer-stage" class="viewer-stage">
          <canvas id="pdf-canvas" hidden></canvas>
          <p id="viewer-empty">No citation selected</p>
        </div>
        <div class="page-controls">
          <button id="prev-page" class="ghost-button" type="button">Prev</button>
          <span id="page-indicator">-</span>
          <button id="next-page" class="ghost-button" type="button">Next</button>
        </div>
      </aside>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
