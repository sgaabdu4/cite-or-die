<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cite-or-die</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">c/d</span>
          <h1>cite-or-die</h1>
        </div>
        <form id="scope-form" class="scope-form">
          <label>
            <span>Tenant</span>
            <input id="tenant" autocomplete="off" value="dev" />
          </label>
          <label>
            <span>Matter</span>
            <input id="matter" autocomplete="off" value="m_default" />
          </label>
        </form>
      </header>

      <section class="workspace" aria-label="RAG workspace">
        <aside class="sources-pane" aria-label="Sources">
          <div class="pane-head">
            <h2>Sources</h2>
            <button id="refresh-docs" class="icon-button" type="button" title="Refresh sources">
              Refresh
            </button>
          </div>

          <form id="upload-form" class="upload-form">
            <label class="file-picker">
              <span id="file-name">Select PDF, TXT, DOCX, or MD</span>
              <input id="file" name="file" type="file" />
            </label>
            <button type="submit">Upload</button>
          </form>

          <ol id="document-list" class="document-list" aria-live="polite"></ol>
          <p id="upload-result" class="status-line" role="status"></p>
        </aside>

        <section class="chat-pane" aria-label="Chat">
          <div id="transcript" class="transcript" aria-live="polite"></div>
          <form id="chat-form" class="composer">
            <textarea
              id="question"
              rows="3"
              placeholder="Ask from the selected matter"
              required
            ></textarea>
            <button id="ask-button" type="submit">Ask</button>
          </form>
        </section>

        <section class="viewer-pane" aria-label="Citation viewer">
          <div class="viewer-toolbar">
            <div>
              <h2 id="viewer-title">Citation</h2>
              <p id="viewer-meta">No source selected</p>
            </div>
            <div class="page-controls">
              <button id="prev-page" type="button" title="Previous page">Prev</button>
              <span id="page-indicator">-</span>
              <button id="next-page" type="button" title="Next page">Next</button>
            </div>
          </div>
          <div id="viewer-stage" class="viewer-stage">
            <canvas id="pdf-canvas" hidden></canvas>
            <p id="viewer-empty">No cited page</p>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
