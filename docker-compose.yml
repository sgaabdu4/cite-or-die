services:
  app:
    build: .
    image: cite-or-die:0.1.0
    environment:
      CITE_OR_DIE_APP_ENV: prod
      CITE_OR_DIE_DATA_DIR: /app/data
      CITE_OR_DIE_AUTH_SECRET_FILE: /run/secrets/auth_secret
      CITE_OR_DIE_VECTOR_BACKEND: qdrant
      CITE_OR_DIE_QDRANT_URL: http://qdrant:6333
      CITE_OR_DIE_EMBEDDING_PROVIDER: hash
      CITE_OR_DIE_LLM_PROVIDER: fake
      CITE_OR_DIE_LLM_MODEL: fake-deterministic-v1
      CITE_OR_DIE_ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      CITE_OR_DIE_OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      CITE_OR_DIE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      CITE_OR_DIE_OTEL_ENABLED: "false"
    secrets:
      - auth_secret
      - anthropic_api_key
      - openai_api_key
    volumes:
      - app-data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: cite_or_die
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$(cat /run/secrets/postgres_user)\" -d cite_or_die",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

secrets:
  auth_secret:
    file: ./secrets/auth_secret.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  app-data:
  postgres-data:
  qdrant-data:
  redis-data:
  caddy-data:
  caddy-config:
